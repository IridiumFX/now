name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF

      - name: Build
        run: cmake --build build --verbose

      - name: Test
        run: ./build/bin/now_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-linux
          path: |
            build/bin/now
            build/bin/now_test

  macos:
    runs-on: macos-latest
    # Caveated platform — failures don't fail the overall run while we
    # iterate on macOS-specific quirks. Promote to required once stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build build

      - name: Test
        run: ./build/bin/now_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-macos-arm64
          path: |
            build/bin/now
            build/bin/now_test

  freebsd:
    runs-on: ubuntu-latest
    # Caveated platform — runs through a FreeBSD VM (vmactions), prone
    # to environment flakes that aren't about now itself. Promote to
    # required once stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y cmake ninja
          run: |
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF
            cmake --build build
            ./build/bin/now_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-freebsd
          path: |
            build/bin/now
            build/bin/now_test

  windows:
    runs-on: windows-latest
    # Use MinGW gcc, not MSVC. Apennines (vendored as lib/apennines)
    # has #ifdef directives inside function-like macro argument lists
    # (e.g. ADD128 in ecdsa.c) — legal under GCC/Clang, rejected by
    # MSVC's preprocessor (C4002 + C2059). Apennines targets gcc/clang
    # everywhere else in the ecosystem; we match that here.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -B build -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_SH=CMAKE_SH-NOTFOUND

      - name: Build
        run: cmake --build build --verbose -j

      - name: Test
        run: ./build/bin/now_test.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-windows
          path: |
            build/bin/now.exe
            build/bin/now_test.exe
