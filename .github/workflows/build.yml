name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF

      - name: Build
        run: cmake --build build --verbose

      - name: Test
        run: ./build/bin/now_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-linux
          path: |
            build/bin/now
            build/bin/now_test

  macos:
    runs-on: macos-latest
    # Caveated platform — failures don't fail the overall run while we
    # iterate on macOS-specific quirks. Promote to required once stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build build

      - name: Test
        run: ./build/bin/now_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-macos-arm64
          path: |
            build/bin/now
            build/bin/now_test

  freebsd:
    runs-on: ubuntu-latest
    # Caveated platform — runs through a FreeBSD VM (vmactions), prone
    # to environment flakes that aren't about now itself. Promote to
    # required once stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y cmake ninja
          run: |
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF
            cmake --build build
            ./build/bin/now_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-freebsd
          path: |
            build/bin/now
            build/bin/now_test

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF

      - name: Build
        run: cmake --build build --config Release --verbose

      - name: Test
        run: .\build\bin\Release\now_test.exe
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-windows
          path: |
            build/bin/Release/now.exe
            build/bin/Release/now_test.exe
