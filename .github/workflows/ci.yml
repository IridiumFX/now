name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
            experimental: false
          - os: macos-latest
            cc: clang
            experimental: true   # caveated; failure ignored while we iterate
          - os: windows-latest
            cc: gcc
            experimental: false

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (Windows — MinGW)
        if: runner.os == 'Windows'
        shell: bash
        run: >
          cmake -B build -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_SH=CMAKE_SH-NOTFOUND

      - name: Configure (POSIX)
        if: runner.os != 'Windows'
        run: cmake -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Debug
        env:
          CC: ${{ matrix.cc }}

      - name: Build
        shell: bash
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)

      - name: Test
        run: |
          if [ -f build/bin/now_test ]; then
            ./build/bin/now_test
          else
            build/bin/now_test.exe
          fi
        shell: bash

      - name: Self-build
        run: |
          if [ -f build/bin/now ]; then
            ./build/bin/now build
          else
            build/bin/now.exe build
          fi
        shell: bash

  freebsd:
    runs-on: ubuntu-latest
    # Caveated platform — vmactions FreeBSD VM, prone to environment
    # flakes outside now itself. Promote to required once stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y cmake ninja gcc
          run: |
            cmake -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Debug
            cmake --build build -j$(sysctl -n hw.ncpu)
            ./build/bin/now_test
